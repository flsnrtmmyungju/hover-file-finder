<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소설 검색</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e1e2e; color: #cdd6f4;
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* 탭 바 */
  #tabBar {
    display: flex;
    border-bottom: 1px solid #313244;
    flex-shrink: 0;
    background: #181825;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 4px;
    background: none;
    border: none;
    color: #6c7086;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color .15s;
  }
  .tab-btn:hover { color: #cdd6f4; }
  .tab-btn.active { color: #89b4fa; border-bottom-color: #89b4fa; }

  /* 탭 패널 */
  .tab-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; padding: 10px 12px 0; }
  .tab-panel.active { display: flex; }

  /* 검색 탭 */
  #queryText {
    font-size: 12px; color: #89b4fa; font-weight: 700;
    margin-bottom: 8px; word-break: break-all; flex-shrink: 0;
  }

  /* 공통 목록 */
  .list-scroll { flex: 1; overflow-y: auto; }
  .section-title {
    font-size: 10px; color: #6c7086; font-weight: 700;
    padding: 4px 0 2px; text-transform: uppercase;
  }
  /* 검색결과 아이템 */
  .item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 5px 6px; border-top: 1px solid #313244; font-size: 12px;
  }
  .item.exact { background: #a6e3a1; border-radius: 4px; margin-bottom: 2px; border-top: none; }
  .item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #1e1e2e; }
  .item:not(.exact) .name { color: #cdd6f4; }
  .item .size { flex-shrink: 0; font-size: 10px; color: #6c7086; margin-left: 6px; }
  .item.exact .size { color: #2d6a4f; }

  /* 기록/상태 아이템 */
  .rec-item {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 4px; border-top: 1px solid #313244;
    cursor: pointer;
  }
  .rec-item:hover { background: #26263a; }
  .rec-name {
    flex: 1; font-size: 12px; color: #cdd6f4;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .rec-meta { font-size: 10px; color: #6c7086; flex-shrink: 0; }
  .rec-pos { font-size: 10px; color: #89b4fa; flex-shrink: 0; min-width: 30px; text-align: right; }
  .del-btn {
    background: none; border: none; color: #45475a;
    cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0;
  }
  .del-btn:hover { color: #f38ba8; }
  .empty { color: #6c7086; font-size: 12px; padding: 8px 0; }

  /* 닫기 버튼 */
  #closeBtn {
    margin: 8px 12px; padding: 5px; background: #313244; color: #cdd6f4;
    border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
    flex-shrink: 0;
  }
  #closeBtn:hover { background: #45475a; }
</style>
</head>
<body>

<div id="tabBar">
  <button class="tab-btn active" data-tab="search">검색</button>
  <button class="tab-btn" data-tab="history">기록</button>
  <button class="tab-btn" data-tab="finished">다읽음</button>
  <button class="tab-btn" data-tab="giveup">포기</button>
</div>

<!-- 검색 탭 -->
<div class="tab-panel active" id="tab-search">
  <div id="queryText"></div>
  <div class="list-scroll" id="results"></div>
</div>

<!-- 읽은기록 탭 -->
<div class="tab-panel" id="tab-history">
  <div class="list-scroll" id="historyList"></div>
</div>

<!-- 다읽음 탭 -->
<div class="tab-panel" id="tab-finished">
  <div class="list-scroll" id="finishedList"></div>
</div>

<!-- 포기 탭 -->
<div class="tab-panel" id="tab-giveup">
  <div class="list-scroll" id="giveupList"></div>
</div>

<button id="closeBtn">닫기 (ESC)</button>
<script src="search-popup.js"></script>
</body>
</html>
